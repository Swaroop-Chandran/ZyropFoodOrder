<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZyropFoodOrder — Order Food Online</title>
  <meta name="description" content="Browse hundreds of food items from top restaurants near you. Order pizza, burgers, biryani and more. Fast delivery at your doorstep."/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/zyrop.css"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode:"class",
      theme:{extend:{colors:{
        "surface-container-low":"#f5f3f3","on-primary-container":"#fffbff","surface-container-lowest":"#ffffff",
        "surface-bright":"#fbf9f8","on-error":"#ffffff","on-primary":"#ffffff","outline":"#907065",
        "surface-container-high":"#e9e8e7","on-tertiary":"#ffffff","surface-variant":"#e4e2e2",
        "tertiary":"#006b29","surface-dim":"#dbdad9","on-secondary":"#ffffff","error":"#ba1a1a",
        "surface":"#fbf9f8","primary-fixed":"#ffdbd0","primary-container":"#d24200","primary":"#a83300",
        "error-container":"#ffdad6","on-surface-variant":"#5c4037","secondary":"#5f5e5e",
        "tertiary-container":"#008735","inverse-surface":"#303031","on-background":"#1b1c1c",
        "background":"#fbf9f8","outline-variant":"#e5beb2","inverse-on-surface":"#f2f0f0",
        "surface-tint":"#ac3500","secondary-container":"#e5e2e1","surface-container":"#efeded",
        "primary-fixed-dim":"#ffb59d","on-surface":"#1b1c1c","surface-container-highest":"#e4e2e2",
        "inverse-primary":"#ffb59d"
      }}}
    }
  </script>
</head>
<body class="bg-surface text-on-surface">

<!-- ===== HEADER ===== -->
<header class="bg-surface border-b border-outline-variant/30 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-10 flex items-center justify-between gap-4 py-4">

    <!-- Logo -->
    <a href="index.html" class="font-extrabold text-xl text-primary whitespace-nowrap flex-shrink-0">
      ZyropFoodOrder
    </a>

    <!-- Search bar (desktop) -->
    <div class="flex-1 max-w-lg hidden sm:flex items-center bg-surface-container rounded-full px-4 py-2.5 gap-2 border border-outline-variant/40">
      <span class="material-symbols-outlined text-secondary" style="font-size:20px">search</span>
      <input id="menu-search" type="text" placeholder="Search dishes, restaurants…"
        class="bg-transparent border-none outline-none text-sm w-full font-medium placeholder:text-secondary"
        oninput="filterItems()"/>
    </div>

    <!-- Right actions -->
    <div class="flex items-center gap-3">

      <!-- Location pill -->
      <div id="header-location" class="hidden lg:flex items-center gap-1.5 bg-surface-container rounded-full px-3 py-1.5 cursor-pointer hover:bg-surface-container-high transition-colors">
        <span class="material-symbols-outlined text-primary" style="font-size:16px">location_on</span>
        <span id="header-loc-text" class="text-xs font-semibold text-on-surface max-w-[120px] truncate">Detecting…</span>
        <span class="material-symbols-outlined text-secondary" style="font-size:14px">keyboard_arrow_down</span>
      </div>

      <!-- Cart button -->
      <a href="cart.html" class="relative flex items-center gap-2 bg-primary text-on-primary rounded-full px-5 py-2 text-sm font-bold hover:bg-primary-container transition-colors">
        <span class="material-symbols-outlined" style="font-size:18px">shopping_cart</span>
        <span class="hidden sm:inline">Cart</span>
        <span class="cart-count-badge" style="display:none; position:absolute; top:-8px; right:-6px; background:#1b1c1c; color:#fff; font-size:10px; font-weight:700; min-width:18px; height:18px; border-radius:9999px; align-items:center; justify-content:center; padding:0 4px;">0</span>
      </a>

      <!-- Account -->
      <a href="login.html" class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors" title="Account">account_circle</a>
    </div>
  </div>

  <!-- Mobile search -->
  <div class="sm:hidden px-4 pb-3">
    <div class="flex items-center bg-surface-container rounded-full px-4 py-2.5 gap-2 border border-outline-variant/40">
      <span class="material-symbols-outlined text-secondary" style="font-size:20px">search</span>
      <input type="text" placeholder="Search dishes…"
        class="bg-transparent border-none outline-none text-sm w-full font-medium placeholder:text-secondary"
        oninput="filterItems(this.value)"/>
    </div>
  </div>
</header>

<!-- ===== CATEGORY FILTER BAR ===== -->
<div class="sticky top-[69px] sm:top-[73px] z-40 bg-surface border-b border-outline-variant/20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-10">
    <div id="category-bar" class="flex gap-2 overflow-x-auto hide-scrollbar py-3">
      <!-- generated by JS -->
    </div>
  </div>
</div>

<!-- ===== FILTER / SORT BAR ===== -->
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-10 py-5 flex items-center justify-between gap-4 flex-wrap">
  <div class="flex items-center gap-2 flex-wrap">
    <span class="text-sm text-secondary font-medium" id="results-count">Loading…</span>
    <div class="flex gap-2">
      <button onclick="setDietFilter('all')" id="diet-all"
        class="diet-btn active px-3 py-1 rounded-full text-xs font-bold border border-outline-variant transition-all bg-primary text-on-primary">All</button>
      <button onclick="setDietFilter('veg')" id="diet-veg"
        class="diet-btn px-3 py-1 rounded-full text-xs font-bold border border-outline-variant transition-all hover:bg-surface-container">🌿 Veg</button>
      <button onclick="setDietFilter('nonveg')" id="diet-nonveg"
        class="diet-btn px-3 py-1 rounded-full text-xs font-bold border border-outline-variant transition-all hover:bg-surface-container">🍗 Non-Veg</button>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <label class="text-xs font-semibold text-secondary">Sort:</label>
    <select onchange="setSortOrder(this.value)"
      class="text-xs font-semibold text-on-surface border border-outline-variant rounded-full px-3 py-1.5 bg-surface outline-none cursor-pointer">
      <option value="popular">Popular</option>
      <option value="price-asc">Price ↑</option>
      <option value="price-desc">Price ↓</option>
      <option value="rating">Top Rated</option>
    </select>
  </div>
</div>

<!-- ===== FOOD GRID ===== -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-10 pb-28">
  <div id="food-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    <!-- Food cards rendered by JS -->
  </div>
  <div id="empty-state" class="hidden flex-col items-center justify-center py-24 gap-4 text-center">
    <div class="text-6xl">🍽️</div>
    <h3 class="text-xl font-bold text-on-surface">No items found</h3>
    <p class="text-secondary text-sm">Try a different category or search term.</p>
    <button onclick="resetFilters()" class="btn-primary mt-2">Show all items</button>
  </div>
</main>

<!-- ===== FLOATING CART (mobile) ===== -->
<div id="floating-cart" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 hidden">
  <a href="cart.html" class="flex items-center gap-4 bg-on-background text-surface rounded-2xl px-6 py-4 shadow-2xl font-bold text-sm animate-bounce-in">
    <span class="material-symbols-outlined" style="font-size:20px">shopping_cart</span>
    <span id="float-cart-info">View Cart</span>
    <span class="bg-primary text-on-primary rounded-full px-3 py-0.5 text-xs" id="float-cart-price">₹0</span>
    <span class="material-symbols-outlined" style="font-size:18px">arrow_forward</span>
  </a>
</div>

<div id="toast-container"></div>
<script src="js/cart.js"></script>
<script>
/* ===================================================
   Data
=================================================== */
const CATEGORIES = [
  { id:'all',      label:'All',       emoji:'🍽️' },
  { id:'biryani',  label:'Biryani',   emoji:'🍛' },
  { id:'pizza',    label:'Pizza',     emoji:'🍕' },
  { id:'burger',   label:'Burger',    emoji:'🍔' },
  { id:'sushi',    label:'Sushi',     emoji:'🍣' },
  { id:'pasta',    label:'Pasta',     emoji:'🍝' },
  { id:'dessert',  label:'Desserts',  emoji:'🍰' },
  { id:'drinks',   label:'Drinks',    emoji:'🥤' },
  { id:'healthy',  label:'Healthy',   emoji:'🥗' },
];

const FOODS = [
  // Biryani
  { id:'b1', name:'Hyderabadi Dum Biryani', restaurant:'Biryani House', cat:'biryani', price:220, rating:4.8, ratingCount:2.3, veg:false, time:'30-40', img:'https://images.unsplash.com/photo-1563379091339-03246963d96c?w=400&q=80', badge:'Bestseller' },
  { id:'b2', name:'Veg Dum Biryani', restaurant:'Spice Garden', cat:'biryani', price:180, rating:4.6, ratingCount:1.2, veg:true, time:'25-35', img:'https://images.unsplash.com/photo-1589301760014-d929f3979dbc?w=400&q=80', badge:'' },
  { id:'b3', name:'Chicken Biryani Bowl', restaurant:'Royal Kitchen', cat:'biryani', price:199, rating:4.7, ratingCount:890, veg:false, time:'35-45', img:'https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?w=400&q=80', badge:'20% Off' },
  // Pizza
  { id:'p1', name:'Margherita Classic', restaurant:'Pizza Primo', cat:'pizza', price:249, rating:4.5, ratingCount:3.1, veg:true, time:'20-30', img:'https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=400&q=80', badge:'' },
  { id:'p2', name:'BBQ Chicken Pizza', restaurant:"Mama's Pizzeria", cat:'pizza', price:349, rating:4.8, ratingCount:4.2, veg:false, time:'25-35', img:'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=400&q=80', badge:"Chef's Pick" },
  { id:'p3', name:'Paneer Tikka Pizza', restaurant:'Pizza Primo', cat:'pizza', price:299, rating:4.6, ratingCount:1.8, veg:true, time:'20-30', img:'https://images.unsplash.com/photo-1571407970349-bc81e7e96d47?w=400&q=80', badge:'Veg Special' },
  // Burger
  { id:'bu1', name:'Classic Smash Burger', restaurant:'Urban Bites', cat:'burger', price:179, rating:4.7, ratingCount:5.2, veg:false, time:'15-25', img:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400&q=80', badge:'Bestseller' },
  { id:'bu2', name:'Veggie Delight Burger', restaurant:'Green Plates', cat:'burger', price:149, rating:4.4, ratingCount:1.1, veg:true, time:'15-20', img:'https://images.unsplash.com/photo-1550317138-10000687a72b?w=400&q=80', badge:'' },
  { id:'bu3', name:'Double Patty Whopper', restaurant:'Urban Bites', cat:'burger', price:229, rating:4.9, ratingCount:6.8, veg:false, time:'20-30', img:'https://images.unsplash.com/photo-1596956470007-2bf6095e7e16?w=400&q=80', badge:'🔥 Trending' },
  // Sushi
  { id:'s1', name:'Salmon Nigiri Set', restaurant:'Ocean Harvest', cat:'sushi', price:499, rating:4.9, ratingCount:2.4, veg:false, time:'25-35', img:'https://images.unsplash.com/photo-1553621042-f6e147245754?w=400&q=80', badge:'Premium' },
  { id:'s2', name:'Veg Maki Roll', restaurant:'Sushi World', cat:'sushi', price:299, rating:4.5, ratingCount:980, veg:true, time:'20-30', img:'https://images.unsplash.com/photo-1617196034183-421b4040ed20?w=400&q=80', badge:'' },
  // Pasta
  { id:'pa1', name:'Pasta Arrabiata', restaurant:'Pasta Fresca', cat:'pasta', price:199, rating:4.6, ratingCount:2.1, veg:true, time:'20-30', img:'https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=400&q=80', badge:'' },
  { id:'pa2', name:'Chicken Alfredo', restaurant:'Pasta Fresca', cat:'pasta', price:259, rating:4.7, ratingCount:1.7, veg:false, time:'25-35', img:'https://images.unsplash.com/photo-1645112411341-6c4fd023714a?w=400&q=80', badge:'Fan Favourite' },
  // Desserts
  { id:'d1', name:'Gulab Jamun (8pcs)', restaurant:'Sweet Cravings', cat:'dessert', price:99, rating:4.8, ratingCount:3.6, veg:true, time:'15-20', img:'https://images.unsplash.com/photo-1666537860000-81b6e0e24e2e?w=400&q=80', badge:'Must Try' },
  { id:'d2', name:'Chocolate Lava Cake', restaurant:'Cafe Delight', cat:'dessert', price:149, rating:4.9, ratingCount:4.1, veg:true, time:'20-25', img:'https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=400&q=80', badge:'🔥 Popular' },
  { id:'d3', name:'Mango Kulfi', restaurant:'Sweet Cravings', cat:'dessert', price:79, rating:4.7, ratingCount:2.0, veg:true, time:'10-15', img:'https://images.unsplash.com/photo-1567352146305-d98e6f4b0e4c?w=400&q=80', badge:'' },
  // Drinks
  { id:'dr1', name:'Mango Lassi', restaurant:'Fresh Sip', cat:'drinks', price:89, rating:4.6, ratingCount:1.5, veg:true, time:'10-15', img:'https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=400&q=80', badge:'Fresh' },
  { id:'dr2', name:'Cold Coffee Shake', restaurant:'Cafe Delight', cat:'drinks', price:119, rating:4.7, ratingCount:2.2, veg:true, time:'10-15', img:'https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=400&q=80', badge:'' },
  // Healthy
  { id:'h1', name:'Quinoa Buddha Bowl', restaurant:'Green Plates', cat:'healthy', price:229, rating:4.5, ratingCount:780, veg:true, time:'20-30', img:'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400&q=80', badge:'Healthy' },
  { id:'h2', name:'Grilled Chicken Salad', restaurant:'FitBites', cat:'healthy', price:269, rating:4.6, ratingCount:1.3, veg:false, time:'15-25', img:'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&q=80', badge:'Low Cal' },
];

/* ===================================================
   State
=================================================== */
let activeCategory = 'all';
let activeDiet = 'all';
let activeSort = 'popular';
let searchQuery = '';

/* ===================================================
   Init
=================================================== */
document.addEventListener('DOMContentLoaded', () => {
  buildCategoryBar();
  renderFoods();
  loadLocation();
  updateFloatingCart();
});

window.addEventListener('zyrop:cart-updated', () => {
  updateFloatingCart();
  updateCartBadge();
});

/* ===================================================
   Category Bar
=================================================== */
function buildCategoryBar() {
  const bar = document.getElementById('category-bar');
  bar.innerHTML = CATEGORIES.map(c => `
    <button id="cat-${c.id}" onclick="setCategory('${c.id}')"
      class="flex-shrink-0 flex items-center gap-1.5 px-4 py-1.5 rounded-full text-sm font-bold border transition-all duration-200
             ${c.id==='all' ? 'bg-primary text-on-primary border-primary' : 'border-outline-variant text-secondary hover:bg-surface-container'}">
      <span>${c.emoji}</span> ${c.label}
    </button>
  `).join('');
}

function setCategory(id) {
  activeCategory = id;
  document.querySelectorAll('[id^="cat-"]').forEach(btn => {
    btn.className = 'flex-shrink-0 flex items-center gap-1.5 px-4 py-1.5 rounded-full text-sm font-bold border transition-all duration-200 border-outline-variant text-secondary hover:bg-surface-container';
  });
  const active = document.getElementById(`cat-${id}`);
  active.className = 'flex-shrink-0 flex items-center gap-1.5 px-4 py-1.5 rounded-full text-sm font-bold border transition-all duration-200 bg-primary text-on-primary border-primary';
  renderFoods();
}

/* ===================================================
   Filters & Sort
=================================================== */
function setDietFilter(diet) {
  activeDiet = diet;
  document.querySelectorAll('.diet-btn').forEach(b => {
    b.className = 'diet-btn px-3 py-1 rounded-full text-xs font-bold border border-outline-variant transition-all hover:bg-surface-container';
  });
  document.getElementById(`diet-${diet}`).className = 'diet-btn active px-3 py-1 rounded-full text-xs font-bold border border-outline-variant transition-all bg-primary text-on-primary';
  renderFoods();
}

function setSortOrder(val) {
  activeSort = val;
  renderFoods();
}

function filterItems() {
  searchQuery = document.getElementById('menu-search')?.value || '';
  renderFoods();
}

function resetFilters() {
  activeCategory = 'all';
  activeDiet = 'all';
  searchQuery = '';
  if (document.getElementById('menu-search')) document.getElementById('menu-search').value = '';
  buildCategoryBar();
  setDietFilter('all');
  renderFoods();
}

/* ===================================================
   Render Foods
=================================================== */
function renderFoods() {
  let items = [...FOODS];

  if (activeCategory !== 'all') items = items.filter(f => f.cat === activeCategory);
  if (activeDiet === 'veg')     items = items.filter(f => f.veg);
  if (activeDiet === 'nonveg')  items = items.filter(f => !f.veg);

  if (searchQuery.trim()) {
    const q = searchQuery.toLowerCase();
    items = items.filter(f => f.name.toLowerCase().includes(q) || f.restaurant.toLowerCase().includes(q));
  }

  if (activeSort === 'price-asc')  items.sort((a,b) => a.price - b.price);
  if (activeSort === 'price-desc') items.sort((a,b) => b.price - a.price);
  if (activeSort === 'rating')     items.sort((a,b) => b.rating - a.rating);

  document.getElementById('results-count').textContent = `${items.length} item${items.length!==1?'s':''} found`;

  const grid  = document.getElementById('food-grid');
  const empty = document.getElementById('empty-state');

  if (items.length === 0) {
    grid.classList.add('hidden');
    empty.classList.remove('hidden');
    empty.classList.add('flex');
    return;
  }
  empty.classList.add('hidden');
  empty.classList.remove('flex');
  grid.classList.remove('hidden');
  grid.innerHTML = items.map((f, i) => foodCard(f, i)).join('');
}

/* ===================================================
   Food Card HTML
=================================================== */
function foodCard(f, i) {
  const qty = ZyropCart.getItemQty(f.id);
  const ratingStr = typeof f.ratingCount === 'number' && f.ratingCount >= 1
    ? `${f.ratingCount}k ratings` : `${f.ratingCount} ratings`;
  return `
  <div class="food-card animate-fade-in-up" style="animation-delay:${i*0.05}s">
    <div class="relative overflow-hidden" style="height:180px">
      <img src="${f.img}" alt="${f.name}" class="w-full h-full object-cover" loading="lazy"
           onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&q=80'"/>
      ${f.badge ? `<span class="absolute top-3 left-3 bg-on-background/85 text-white text-[11px] font-bold px-2.5 py-1 rounded-full">${f.badge}</span>` : ''}
      <span class="absolute top-3 right-3 w-5 h-5 rounded border-2 flex items-center justify-center text-[10px] font-bold ${f.veg ? 'border-green-600 text-green-600 bg-white' : 'border-red-600 text-red-600 bg-white'}">●</span>
    </div>
    <div class="p-4 flex flex-col gap-2">
      <div>
        <h3 class="font-bold text-sm text-on-surface leading-snug">${f.name}</h3>
        <p class="text-xs text-secondary mt-0.5">${f.restaurant}</p>
      </div>
      <div class="flex items-center gap-3 text-xs text-secondary">
        <span class="flex items-center gap-1">
          <span class="material-symbols-outlined filled text-yellow-500" style="font-size:14px">star</span>
          <span class="font-semibold text-on-surface">${f.rating}</span>
          <span>(${ratingStr})</span>
        </span>
        <span>·</span>
        <span class="flex items-center gap-0.5">
          <span class="material-symbols-outlined" style="font-size:14px">schedule</span>
          ${f.time} min
        </span>
      </div>
      <div class="flex items-center justify-between mt-1">
        <span class="font-extrabold text-base text-on-surface">₹${f.price}</span>
        ${qty === 0
          ? `<button onclick="addToCart('${f.id}')" id="add-btn-${f.id}"
               class="flex items-center gap-1.5 bg-primary text-on-primary rounded-full px-4 py-1.5 text-xs font-bold hover:bg-primary-container active:scale-95 transition-all">
               <span class="material-symbols-outlined" style="font-size:16px">add</span> Add
             </button>`
          : `<div class="qty-stepper" id="stepper-${f.id}">
               <button class="qty-btn" onclick="changeQty('${f.id}',-1)">−</button>
               <span class="qty-count" id="qty-${f.id}">${qty}</span>
               <button class="qty-btn" onclick="changeQty('${f.id}',1)">+</button>
             </div>`
        }
      </div>
    </div>
  </div>`;
}

/* ===================================================
   Cart Actions
=================================================== */
function addToCart(id) {
  const food = FOODS.find(f => f.id === id);
  if (!food) return;
  const qty = ZyropCart.addItem({ id:food.id, name:food.name, price:food.price, image:food.img, restaurant:food.restaurant, veg:food.veg });
  showToast(`${food.name} added to cart! 🛒`, 'success', 2000);
  updateFoodCardBtn(id, qty);
  updateFloatingCart();
}

function changeQty(id, delta) {
  if (delta > 0) ZyropCart.incrementItem(id);
  else ZyropCart.decrementItem(id);
  const qty = ZyropCart.getItemQty(id);
  updateFoodCardBtn(id, qty);
  updateFloatingCart();
}

function updateFoodCardBtn(id, qty) {
  const addBtn  = document.getElementById(`add-btn-${id}`);
  const stepper = document.getElementById(`stepper-${id}`);

  if (qty === 0) {
    if (stepper) {
      stepper.outerHTML = `<button onclick="addToCart('${id}')" id="add-btn-${id}"
        class="flex items-center gap-1.5 bg-primary text-on-primary rounded-full px-4 py-1.5 text-xs font-bold hover:bg-primary-container active:scale-95 transition-all">
        <span class="material-symbols-outlined" style="font-size:16px">add</span> Add
      </button>`;
    }
  } else {
    if (addBtn) {
      addBtn.outerHTML = `<div class="qty-stepper" id="stepper-${id}">
        <button class="qty-btn" onclick="changeQty('${id}',-1)">−</button>
        <span class="qty-count" id="qty-${id}">${qty}</span>
        <button class="qty-btn" onclick="changeQty('${id}',1)">+</button>
      </div>`;
    } else if (document.getElementById(`qty-${id}`)) {
      document.getElementById(`qty-${id}`).textContent = qty;
    }
  }
}

/* ===================================================
   Floating Cart
=================================================== */
function updateFloatingCart() {
  const count    = ZyropCart.getTotalCount();
  const subtotal = ZyropCart.getSubtotal();
  const fc = document.getElementById('floating-cart');
  if (count > 0) {
    fc.classList.remove('hidden');
    document.getElementById('float-cart-info').textContent  = `${count} item${count>1?'s':''}`;
    document.getElementById('float-cart-price').textContent = `₹${subtotal}`;
  } else {
    fc.classList.add('hidden');
  }
}

/* ===================================================
   Location
=================================================== */
function loadLocation() {
  const loc  = ZyropLocation.get();
  const wrap = document.getElementById('header-location');
  const text = document.getElementById('header-loc-text');
  wrap.classList.remove('hidden');
  if (loc) {
    text.textContent = loc.label.split(',')[0];
  } else {
    text.textContent = 'Set location';
    ZyropLocation.detect(
      (l) => { text.textContent = l.label.split(',')[0]; },
      ()  => { text.textContent = 'Set location'; }
    );
  }
}
</script>
